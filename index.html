<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Chicago Crime 2024 | Full Data Analytics</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        :root {
            --bg: #0d1117; --card: #161b22; --border: #30363d;
            --text: #c9d1d9; --primary: #58a6ff; --accent: #3fb950;
        }
        body {
            background: var(--bg); color: var(--text);
            font-family: sans-serif; margin: 0; padding: 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.5fr;
            grid-gap: 20px;
            max-width: 1400px; margin: auto;
        }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; padding: 15px;
        }
        .full-width { grid-column: span 3; }
        .half-width { grid-column: span 2; }
        
        .stat-number { font-size: 40px; font-weight: bold; color: var(--primary); }
        .controls button {
            background: #21262d; border: 1px solid var(--border);
            color: white; padding: 8px 12px; border-radius: 6px; cursor: pointer;
        }
        button.active { background: var(--primary); border-color: var(--primary); }
        
        /* Chart Styles */
        .bar { fill: #8957e5; transition: fill 0.2s; }
        .bar:hover { fill: var(--primary); }
        .area { fill: rgba(88, 166, 255, 0.2); stroke: var(--primary); stroke-width: 2; }
        .axis text { fill: #8b949e; font-size: 11px; }
        .axis line, .axis path { stroke: #30363d; }
    </style>
</head>
<body>

<div class="grid">
    <div class="card">
        <h2>Filters</h2>
        <div class="controls" id="filters">
            <button class="active" data-val="all">All Crimes</button>
            <button data-val="arrest">Arrests Only</button>
            <button data-val="domestic">Domestic</button>
        </div>
        <div style="margin-top: 20px;">
            <h3>Total Crimes</h3>
            <div class="stat-number" id="count-display">0</div>
        </div>
    </div>

    <div class="card half-width">
        <h3>Crime Map (Hotspots)</h3>
        <div id="map"></div>
    </div>

    <div class="card">
        <h3>Top 5 Crime Types</h3>
        <div id="type-chart"></div>
    </div>

    <div class="card">
        <h3>Top 5 Locations</h3>
        <div id="loc-chart"></div>
    </div>

    <div class="card">
        <h3>Crime by Sector</h3>
        <div id="sector-chart"></div>
    </div>

    <div class="card full-width">
        <h3>24-Hour Crime Trend (Temporal Data)</h3>
        <div id="time-chart"></div>
    </div>
</div>

<script>
    const margin = {top: 10, right: 10, bottom: 40, left: 50};
    let fullData = [];

    // Load the final preprocessed file
    d3.csv("final_preprocessed_crimes_2024.csv").then(data => {
        fullData = data.map(d => ({
            ...d,
            Hour: +d.Hour, Arrest: +d.Arrest, Domestic: +d.Domestic,
            Lat_Scaled: +d.Lat_MinMax, Long_Scaled: +d.Long_MinMax
        }));
        
        updateDashboard("all");

        d3.selectAll("button").on("click", function() {
            d3.selectAll("button").classed("active", false);
            d3.select(this).classed("active", true);
            updateDashboard(d3.select(this).attr("data-val"));
        });
    }).catch(e => console.error("Error: Run 'python3 -m http.server 8000' to view.", e));

    function updateDashboard(filter) {
        let filtered = fullData;
        if (filter === "arrest") filtered = fullData.filter(d => d.Arrest === 1);
        if (filter === "domestic") filtered = fullData.filter(d => d.Domestic === 1);

        d3.select("#count-display").text(filtered.length.toLocaleString());

        // Call all visualization functions
        renderBarChart("#type-chart", filtered, "Primary Type");
        renderBarChart("#loc-chart", filtered, "Location Description");
        renderBarChart("#sector-chart", filtered, "City_Sector");
        renderAreaChart("#time-chart", filtered);
        renderMap("#map", filtered.slice(0, 5000)); // Sample map for performance
    }

    function renderBarChart(id, data, column) {
        const width = 350 - margin.left - margin.right;
        const height = 250 - margin.top - margin.bottom;
        d3.select(id).html("");
        
        const counts = d3.rollups(data, v => v.length, d => d[column])
            .sort((a, b) => b[1] - a[1]).slice(0, 5);

        const svg = d3.select(id).append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleBand().range([0, width]).domain(counts.map(d => d[0])).padding(0.2);
        const y = d3.scaleLinear().range([height, 0]).domain([0, d3.max(counts, d => d[1])]);

        svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x))
            .selectAll("text").style("text-anchor", "end").attr("dx", "-.8em").attr("dy", ".15em").attr("transform", "rotate(-35)");
        
        svg.append("g").call(d3.axisLeft(y).ticks(5).tickFormat(d3.format(".1s")));

        svg.selectAll(".bar").data(counts).enter().append("rect").attr("class", "bar")
            .attr("x", d => x(d[0])).attr("y", d => y(d[1]))
            .attr("width", x.bandwidth()).attr("height", d => height - y(d[1]));
    }

    function renderAreaChart(id, data) {
        const width = 1200 - margin.left - margin.right;
        const height = 200 - margin.top - margin.bottom;
        d3.select(id).html("");

        const counts = d3.rollups(data, v => v.length, d => d.Hour).sort((a,b) => a[0]-b[0]);
        const svg = d3.select(id).append("svg")
            .attr("width", width + margin.left + margin.right)
            .attr("height", height + margin.top + margin.bottom)
            .append("g").attr("transform", `translate(${margin.left},${margin.top})`);

        const x = d3.scaleLinear().domain([0, 23]).range([0, width]);
        const y = d3.scaleLinear().domain([0, d3.max(counts, d => d[1])]).range([height, 0]);

        const area = d3.area().x(d => x(d[0])).y0(y(0)).y1(d => y(d[1])).curve(d3.curveMonotoneX);
        svg.append("path").datum(counts).attr("class", "area").attr("d", area);
        svg.append("g").attr("transform", `translate(0,${height})`).call(d3.axisBottom(x).ticks(24).tickFormat(d => d + ":00"));
        svg.append("g").call(d3.axisLeft(y).ticks(5));
    }

    function renderMap(id, data) {
        const width = 600, height = 400;
        d3.select(id).html("");
        const svg = d3.select(id).append("svg").attr("viewBox", `0 0 ${width} ${height}`);
        
        const x = d3.scaleLinear().domain([0, 1]).range([20, width - 20]);
        const y = d3.scaleLinear().domain([0, 1]).range([height - 20, 20]);

        svg.selectAll("circle").data(data).enter().append("circle")
            .attr("cx", d => x(d.Long_Scaled)).attr("cy", d => y(d.Lat_Scaled))
            .attr("r", 1.5).attr("fill", "#3fb950").attr("opacity", 0.4);
    }
</script>
</body>
</html>
